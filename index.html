<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>U.S. Citizenship Test Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #dc2626;
      --red-soft: #fca5a5;
      --blue: #2563eb;
      --blue-soft: #93c5fd;
      --navy: #0f172a;
      --slate-950: #020617;
      --slate-900: #0f172a;
      --slate-800: #1e293b;
      --slate-700: #334155;
      --slate-600: #475569;
      --slate-500: #64748b;
      --slate-400: #94a3b8;
      --slate-300: #cbd5e1;
      --slate-200: #e2e8f0;
      --slate-100: #f1f5f9;
      --green: #22c55e;
      --green-soft: #86efac;
      --card-bg: rgba(15, 23, 42, 0.6);
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.06);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-full: 9999px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--slate-950);
      min-height: 100vh;
      color: var(--slate-200);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Ambient background ===== */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .ambient .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      animation: orbFloat 20s ease-in-out infinite alternate;
    }

    .ambient .orb-red {
      width: 600px; height: 600px;
      background: var(--red);
      top: -15%; left: -10%;
      animation-delay: 0s;
    }

    .ambient .orb-blue {
      width: 700px; height: 700px;
      background: var(--blue);
      bottom: -20%; right: -10%;
      animation-delay: -7s;
    }

    .ambient .orb-white {
      width: 400px; height: 400px;
      background: #ffffff;
      top: 30%; left: 50%;
      transform: translateX(-50%);
      opacity: 0.04;
      animation-delay: -12s;
    }

    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 15px) scale(0.95); }
      100% { transform: translate(10px, -10px) scale(1.02); }
    }

    /* Subtle dot grid pattern */
    .ambient::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* ===== Fireworks canvas ===== */
    #fireworksCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }

    /* ===== Layout container ===== */
    .container {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ===== Header ===== */
    header {
      text-align: center;
      padding: 40px 0 8px;
    }

    .header-flag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 6px 14px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--slate-400);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header-flag .flag-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }

    .header-flag .flag-dot.r { background: var(--red); }
    .header-flag .flag-dot.w { background: #fff; }
    .header-flag .flag-dot.b { background: var(--blue); }

    header h1 {
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.1;
      color: #fff;
      margin-bottom: 6px;
    }

    header .subtitle {
      font-size: 0.9rem;
      color: var(--slate-500);
      font-weight: 400;
    }

    /* ===== Filter pills ===== */
    .filters {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 16px 0 20px;
    }

    .filters button {
      padding: 7px 14px;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-full);
      background: transparent;
      color: var(--slate-500);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filters button:hover {
      background: rgba(255,255,255,0.05);
      color: var(--slate-300);
      border-color: rgba(255,255,255,0.12);
    }

    .filters button.active {
      background: #fff;
      color: var(--slate-950);
      border-color: #fff;
    }

    .filters .sep {
      width: 1px;
      background: var(--glass-border);
      margin: 4px 4px;
    }

    /* ===== Progress ===== */
    .progress {
      padding-bottom: 14px;
    }

    .progress .track {
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red), #fff 50%, var(--blue));
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress .meta {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 0.72rem;
      color: var(--slate-600);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    /* ===== Card ===== */
    .card-area {
      perspective: 1200px;
      padding-bottom: 16px;
    }

    .card-container {
      width: 100%;
      height: 340px;
      cursor: pointer;
      position: relative;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 32px;
      text-align: center;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .card-front {
      background: linear-gradient(160deg,
        rgba(30, 41, 59, 0.7) 0%,
        rgba(15, 23, 42, 0.8) 100%
      );
    }

    /* Subtle patriotic top accent line on front */
    .card-front::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 2px;
      background: linear-gradient(90deg, var(--red), transparent 30%, transparent 70%, var(--blue));
      border-radius: 0 0 2px 2px;
      opacity: 0.5;
    }

    .card-back {
      background: linear-gradient(160deg,
        rgba(20, 45, 30, 0.7) 0%,
        rgba(10, 30, 18, 0.85) 100%
      );
      transform: rotateY(180deg);
    }

    .card-back::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 2px;
      background: linear-gradient(90deg, var(--green), transparent 50%);
      border-radius: 0 0 2px 2px;
      opacity: 0.4;
    }

    .card-badge {
      position: absolute;
      top: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--slate-500);
    }

    .card-badge.left { left: 20px; }
    .card-badge.right { right: 20px; }

    .card-badge .pill {
      padding: 2px 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius-full);
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--slate-500);
    }

    .question {
      font-size: 1.3rem;
      font-weight: 600;
      line-height: 1.55;
      color: var(--slate-100);
      letter-spacing: -0.2px;
      max-width: 460px;
    }

    .hint {
      margin-top: 24px;
      font-size: 0.78rem;
      color: var(--slate-600);
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hint .key-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px; height: 22px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 5px;
      font-size: 0.6rem;
      color: var(--slate-500);
    }

    .answer-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--green);
      margin-bottom: 14px;
      font-weight: 600;
      opacity: 0.8;
    }

    .answer {
      font-size: 1.15rem;
      line-height: 1.65;
      color: var(--green-soft);
      font-weight: 500;
      max-width: 440px;
    }

    .answer .sep {
      display: block;
      width: 24px;
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 8px auto;
    }

    /* ===== Action buttons ===== */
    .actions {
      display: flex;
      gap: 10px;
      padding-bottom: 16px;
    }

    .actions button {
      flex: 1;
      padding: 13px 12px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .actions button:active { transform: scale(0.97); }

    .btn-wrong {
      background: rgba(220, 38, 38, 0.08);
      color: var(--red-soft);
      border: 1px solid rgba(220, 38, 38, 0.15) !important;
    }
    .btn-wrong:hover {
      background: rgba(220, 38, 38, 0.15);
      border-color: rgba(220, 38, 38, 0.3) !important;
    }

    .btn-skip {
      flex: 0.55;
      background: rgba(255, 255, 255, 0.03);
      color: var(--slate-500);
      border: 1px solid rgba(255, 255, 255, 0.06) !important;
    }
    .btn-skip:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--slate-400);
    }

    .btn-right {
      background: rgba(34, 197, 94, 0.1);
      color: var(--green-soft);
      border: 1px solid rgba(34, 197, 94, 0.15) !important;
    }
    .btn-right:hover {
      background: rgba(34, 197, 94, 0.18);
      border-color: rgba(34, 197, 94, 0.3) !important;
    }

    /* ===== Score strip ===== */
    .score-strip {
      display: flex;
      justify-content: center;
      gap: 24px;
      padding: 4px 0 8px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--slate-600);
      font-variant-numeric: tabular-nums;
    }

    .score-strip .stat {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .score-strip .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }

    .dot-right { background: var(--green); }
    .dot-wrong { background: var(--red); }
    .dot-remain { background: var(--slate-700); }

    /* ===== Keyboard hints ===== */
    .kbd-hints {
      text-align: center;
      padding: 4px 0 32px;
      font-size: 0.7rem;
      color: var(--slate-700);
      font-weight: 400;
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .kbd-hints span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .kbd-hints kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 20px;
      padding: 0 5px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.62rem;
      font-weight: 500;
      color: var(--slate-600);
    }

    /* ===== Complete screen ===== */
    .complete-screen {
      text-align: center;
      padding: 80px 0;
      display: none;
    }

    .complete-screen.show { display: block; }

    .complete-screen .badge {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.15);
      border-radius: var(--radius-full);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--green);
      margin-bottom: 16px;
    }

    .complete-screen h2 {
      font-size: 1.8rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .complete-screen .score-big {
      font-size: 4.5rem;
      font-weight: 800;
      letter-spacing: -2px;
      margin: 12px 0;
      background: linear-gradient(135deg, var(--red-soft), #fff, var(--blue-soft));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .complete-screen p {
      color: var(--slate-500);
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    .complete-screen .btn-group {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .complete-screen button {
      padding: 12px 28px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .complete-screen button:active { transform: scale(0.97); }

    .complete-screen .btn-primary {
      background: #fff;
      color: var(--slate-950);
    }

    .complete-screen .btn-primary:hover { background: var(--slate-200); }

    .complete-screen .btn-ghost {
      background: rgba(255,255,255,0.05);
      color: var(--slate-400);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .complete-screen .btn-ghost:hover { background: rgba(255,255,255,0.08); }

    .game-area { }
    .game-area.hidden { display: none; }

    /* ===== Card animations ===== */
    .card-enter {
      animation: cardEnter 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Correct flash */
    .card-container.flash-correct .card-front,
    .card-container.flash-correct .card-back {
      border-color: rgba(34, 197, 94, 0.4) !important;
      box-shadow: 0 0 30px rgba(34, 197, 94, 0.1);
    }

    /* ===== Responsive ===== */
    @media (max-width: 600px) {
      header h1 { font-size: 1.7rem; }
      .card-container { height: 300px; }
      .question { font-size: 1.1rem; }
      .answer { font-size: 1rem; }
      .filters button { font-size: 0.75rem; padding: 6px 11px; }
      .kbd-hints { display: none; }
    }
  </style>
</head>
<body>

<!-- Ambient background -->
<div class="ambient">
  <div class="orb orb-red"></div>
  <div class="orb orb-blue"></div>
  <div class="orb orb-white"></div>
</div>

<!-- Fireworks -->
<canvas id="fireworksCanvas"></canvas>

<div class="container">

  <header>
    <div class="header-flag">
      <span class="flag-dot r"></span>
      <span class="flag-dot w"></span>
      <span class="flag-dot b"></span>
      <span>Citizenship Prep</span>
    </div>
    <h1>U.S. Civics Flashcards</h1>
    <p class="subtitle">100 official USCIS questions for the naturalization test</p>
  </header>

  <div class="filters" id="filters">
    <button class="active" data-category="all">All 100</button>
    <button data-category="government">Government</button>
    <button data-category="history">History</button>
    <button data-category="civics">Civics</button>
    <div class="sep"></div>
    <button id="shuffleBtn">Shuffle</button>
    <button id="missedBtn">Review missed</button>
  </div>

  <div class="game-area" id="gameArea">

    <div class="progress">
      <div class="track"><div class="fill" id="progressFill" style="width:0%"></div></div>
      <div class="meta">
        <span id="progressText">1 / 100</span>
        <span id="percentText">0% complete</span>
      </div>
    </div>

    <div class="card-area">
      <div class="card-container" id="cardContainer">
        <div class="card" id="card">
          <div class="card-face card-front">
            <span class="card-badge left" id="cardNumber">Q1</span>
            <span class="card-badge right"><span class="pill" id="cardCategory">Government</span></span>
            <div class="question" id="questionText"></div>
            <div class="hint">
              <span class="key-icon">&#9251;</span> Tap to reveal answer
            </div>
          </div>
          <div class="card-face card-back">
            <span class="card-badge left" id="cardNumberBack">Q1</span>
            <div class="answer-label">Answer</div>
            <div class="answer" id="answerText"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-wrong" id="wrongBtn">Missed it</button>
      <button class="btn-skip" id="skipBtn">Skip</button>
      <button class="btn-right" id="rightBtn">Got it!</button>
    </div>

    <div class="score-strip">
      <span class="stat"><span class="dot dot-right"></span><span id="rightCount">0</span> correct</span>
      <span class="stat"><span class="dot dot-wrong"></span><span id="wrongCount">0</span> missed</span>
      <span class="stat"><span class="dot dot-remain"></span><span id="remainCount">100</span> left</span>
    </div>

    <div class="kbd-hints">
      <span><kbd>Space</kbd> flip</span>
      <span><kbd>&larr;</kbd> miss</span>
      <span><kbd>&rarr;</kbd> got it</span>
      <span><kbd>&darr;</kbd> skip</span>
    </div>

  </div>

  <div class="complete-screen" id="completeScreen">
    <div class="badge">Round complete</div>
    <h2>Nice work!</h2>
    <div class="score-big" id="finalScore">0%</div>
    <p id="finalMessage"></p>
    <div class="btn-group">
      <button class="btn-primary" id="restartBtn">Start over</button>
      <button class="btn-ghost" id="reviewMissedBtn">Review missed</button>
    </div>
  </div>

</div>

<script>
// ===== AUDIO =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function playCorrectSound() {
  if (!audioCtx) audioCtx = new AudioCtx();
  const now = audioCtx.currentTime;

  const notes = [523.25, 783.99];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "triangle";
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.15, now + i * 0.08);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.3);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now + i * 0.08);
    osc.stop(now + i * 0.08 + 0.35);
  });

  const osc2 = audioCtx.createOscillator();
  const g2 = audioCtx.createGain();
  osc2.type = "sine";
  osc2.frequency.value = 1568;
  g2.gain.setValueAtTime(0.04, now + 0.1);
  g2.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
  osc2.connect(g2);
  g2.connect(audioCtx.destination);
  osc2.start(now + 0.1);
  osc2.stop(now + 0.5);
}

// ===== FIREWORKS =====
const canvas = document.getElementById("fireworksCanvas");
const ctx = canvas.getContext("2d");
let particles = [];
let fireworksRunning = false;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 5 + 2;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.alpha = 1;
    this.decay = Math.random() * 0.025 + 0.02;
    this.color = color;
    this.size = Math.random() * 2.5 + 0.8;
    this.gravity = 0.055;
  }
  update() {
    this.vx *= 0.98; this.vy *= 0.98;
    this.vy += this.gravity;
    this.x += this.vx; this.y += this.vy;
    this.alpha -= this.decay;
  }
  draw(c) {
    c.save();
    c.globalAlpha = Math.max(0, this.alpha);
    c.fillStyle = this.color;
    c.beginPath();
    c.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    c.fill();
    c.restore();
  }
}

function launchFirework() {
  const palettes = [
    ["#ff4060","#ff8090","#ffffff","#ffd0d8"],
    ["#ffffff","#e8ecff","#c0d0ff"],
    ["#4080ff","#80aaff","#ffffff"],
    ["#ff4060","#ffffff","#4080ff"],
  ];
  const pal = palettes[Math.floor(Math.random() * palettes.length)];
  const x = canvas.width * (0.2 + Math.random() * 0.6);
  const y = canvas.height * (0.1 + Math.random() * 0.4);
  const count = 25 + Math.floor(Math.random() * 15);
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, pal[Math.floor(Math.random() * pal.length)]));
  }
}

function animateFireworks() {
  if (!fireworksRunning && particles.length === 0) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.alpha > 0);
  particles.forEach(p => { p.update(); p.draw(ctx); });
  if (fireworksRunning || particles.length > 0) {
    requestAnimationFrame(animateFireworks);
  } else {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}

function triggerCelebration() {
  playCorrectSound();
  fireworksRunning = true;
  launchFirework();
  setTimeout(() => launchFirework(), 100);
  setTimeout(() => launchFirework(), 220);
  setTimeout(() => { fireworksRunning = false; }, 350);
  animateFireworks();
  cardContainer.classList.add("flash-correct");
  setTimeout(() => cardContainer.classList.remove("flash-correct"), 300);
}

// ===== STATE =====
let deck = [], currentIndex = 0, correct = 0, wrong = 0, missed = [];
let isFlipped = false, activeCategory = "all";

const card = document.getElementById("card");
const cardContainer = document.getElementById("cardContainer");
const questionText = document.getElementById("questionText");
const answerText = document.getElementById("answerText");
const cardNumber = document.getElementById("cardNumber");
const cardNumberBack = document.getElementById("cardNumberBack");
const cardCategory = document.getElementById("cardCategory");
const progressFill = document.getElementById("progressFill");
const progressText = document.getElementById("progressText");
const percentText = document.getElementById("percentText");
const rightCount = document.getElementById("rightCount");
const wrongCount = document.getElementById("wrongCount");
const remainCount = document.getElementById("remainCount");
const gameArea = document.getElementById("gameArea");
const completeScreen = document.getElementById("completeScreen");
const finalScore = document.getElementById("finalScore");
const finalMessage = document.getElementById("finalMessage");

const categoryLabels = { government: "Government", history: "History", civics: "Civics" };

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initDeck(cards) {
  deck = [...cards]; currentIndex = 0; correct = 0; wrong = 0; missed = [];
  isFlipped = false;
  showCard(); updateProgress();
  gameArea.classList.remove("hidden");
  completeScreen.classList.remove("show");
}

function showCard() {
  if (currentIndex >= deck.length) { showComplete(); return; }
  const c = deck[currentIndex];
  questionText.textContent = c.q;
  cardNumber.textContent = "Q" + c.id;
  cardNumberBack.textContent = "Q" + c.id;
  cardCategory.textContent = categoryLabels[c.category] || c.category;

  if (c.a.length === 1) {
    answerText.textContent = c.a[0];
  } else {
    answerText.innerHTML = c.a.join('<span class="sep"></span>');
  }

  isFlipped = false;
  card.classList.remove("flipped");
  card.classList.remove("card-enter");
  void card.offsetWidth;
  card.classList.add("card-enter");
}

function flipCard() {
  isFlipped = !isFlipped;
  card.classList.toggle("flipped", isFlipped);
}

function updateProgress() {
  const total = deck.length, done = correct + wrong;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  progressFill.style.width = pct + "%";
  progressText.textContent = Math.min(currentIndex + 1, total) + " / " + total;
  percentText.textContent = pct + "% complete";
  rightCount.textContent = correct;
  wrongCount.textContent = wrong;
  remainCount.textContent = Math.max(0, total - done);
}

function markRight() {
  if (currentIndex >= deck.length) return;
  triggerCelebration();
  correct++; currentIndex++;
  updateProgress(); showCard();
}

function markWrong() {
  if (currentIndex >= deck.length) return;
  missed.push(deck[currentIndex]);
  wrong++; currentIndex++;
  updateProgress(); showCard();
}

function skip() {
  if (currentIndex >= deck.length) return;
  deck.push(deck[currentIndex]);
  deck.splice(currentIndex, 1);
  showCard();
}

function showComplete() {
  gameArea.classList.add("hidden");
  completeScreen.classList.add("show");
  const total = correct + wrong;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  finalScore.textContent = pct + "%";

  triggerCelebration();
  setTimeout(() => triggerCelebration(), 300);
  setTimeout(() => triggerCelebration(), 600);

  if (pct === 100) finalMessage.textContent = "Perfect score! You're ready for this test.";
  else if (pct >= 90) finalMessage.textContent = "Almost perfect \u2014 just a few to review.";
  else if (pct >= 70) finalMessage.textContent = "Great progress. Review the missed ones and you'll be set.";
  else if (pct >= 50) finalMessage.textContent = "Good start! Keep studying the ones you missed.";
  else finalMessage.textContent = "Keep at it \u2014 try reviewing the missed cards.";

  document.getElementById("reviewMissedBtn").style.display = missed.length > 0 ? "inline-block" : "none";
}

// Events
cardContainer.addEventListener("click", flipCard);
document.getElementById("rightBtn").addEventListener("click", markRight);
document.getElementById("wrongBtn").addEventListener("click", markWrong);
document.getElementById("skipBtn").addEventListener("click", skip);

document.getElementById("shuffleBtn").addEventListener("click", () => {
  const f = activeCategory === "all" ? flashcards : flashcards.filter(c => c.category === activeCategory);
  initDeck(shuffle(f));
});

document.getElementById("missedBtn").addEventListener("click", () => {
  if (missed.length === 0) return;
  initDeck(shuffle(missed));
});

document.getElementById("restartBtn").addEventListener("click", () => {
  const f = activeCategory === "all" ? flashcards : flashcards.filter(c => c.category === activeCategory);
  initDeck(shuffle(f));
});

document.getElementById("reviewMissedBtn").addEventListener("click", () => {
  if (missed.length === 0) return;
  initDeck(shuffle(missed));
});

document.querySelectorAll(".filters button[data-category]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filters button[data-category]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeCategory = btn.dataset.category;
    const f = activeCategory === "all" ? flashcards : flashcards.filter(c => c.category === activeCategory);
    initDeck(shuffle(f));
  });
});

document.addEventListener("keydown", (e) => {
  if (e.key === " " || e.code === "Space") { e.preventDefault(); flipCard(); }
  else if (e.key === "ArrowRight") markRight();
  else if (e.key === "ArrowLeft") markWrong();
  else if (e.key === "ArrowDown") { e.preventDefault(); skip(); }
});

initDeck(shuffle(flashcards));
</script>
